name: Scrape Netmeds

on:
  # Every 6 hours. Public repos: unlimited Actions minutes on standard runners.
  schedule:
    - cron: "0 */6 * * *"
  # Allow manual trigger from the Actions tab.
  workflow_dispatch:
    inputs:
      limit:
        description: "Max medicines to scrape"
        required: false
        default: "50"

concurrency:
  group: scrape-netmeds
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape Netmeds prices
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt

      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run Netmeds scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -m scrapers.run --site netmeds --limit "${{ github.event.inputs.limit || '50' }}"
