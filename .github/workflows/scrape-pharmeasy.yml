name: Scrape PharmEasy

on:
  # Every 6 hours, offset 1h from Netmeds to spread the load.
  schedule:
    - cron: "0 1,7,13,19 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max medicines to scrape"
        required: false
        default: "50"

concurrency:
  group: scrape-pharmeasy
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape PharmEasy prices
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt

      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run PharmEasy scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -m scrapers.run --site pharmeasy --limit "${{ github.event.inputs.limit || '50' }}"
